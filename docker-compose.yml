name: tcventory

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: ${APP_IMAGE:-ghcr.io/tcventory/tcventory-app}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-tcventory}
      DB_USERNAME: ${DB_USERNAME:-tcventory}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      FILESYSTEM_DISK: local
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-null}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TCventory}
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: ${WEB_IMAGE:-ghcr.io/tcventory/tcventory-web}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - app_storage:/var/www/html/storage:ro

  queue:
    image: ${APP_IMAGE:-ghcr.io/tcventory/tcventory-app}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: php artisan queue:work --sleep=1 --tries=3 --max-time=3600
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-tcventory}
      DB_USERNAME: ${DB_USERNAME:-tcventory}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  scheduler:
    image: ${APP_IMAGE:-ghcr.io/tcventory/tcventory-app}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY:-}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-tcventory}
      DB_USERNAME: ${DB_USERNAME:-tcventory}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tcventory}
      POSTGRES_USER: ${DB_USERNAME:-tcventory}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tcventory} -d ${DB_DATABASE:-tcventory}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"${REDIS_PASSWORD:-redispass}\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-redispass}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
  app_storage:
