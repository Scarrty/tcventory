name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & publish Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tcventory-app:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository_owner }}/tcventory-app:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tcventory-web:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository_owner }}/tcventory-web:latest

  compose-release:
    name: Create release docker-compose file
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate versioned compose file
        run: |
          TAG="${{ github.event.release.tag_name }}"
          sed "s/\${IMAGE_TAG:-latest}/${TAG}/g" docker-compose.yml > docker-compose.release.yml

      - name: Upload docker-compose release asset
        uses: softprops/action-gh-release@v2
        with:
          files: docker-compose.release.yml
